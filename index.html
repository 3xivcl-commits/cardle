<title>Cardle</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --green: #22c55e;
    --green-bg: #052e16;
    --orange: #f59e0b;
    --orange-bg: #2d1a00;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; max-width: 900px; padding: 2rem 1rem 1rem; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 52px; font-weight: 800; letter-spacing: -1px; color: var(--text); line-height: 1; margin-bottom: 4px; }
  .logo span { color: var(--red); }
  .tagline { font-size: 13px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  main { width: 100%; max-width: 900px; padding: 0 1rem 3rem; }
  .legend { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .search-area { position: relative; margin-bottom: 1rem; }
  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; padding: 0 14px; height: 44px; outline: none; transition: border-color 0.15s; }
  .search-row input:focus { border-color: #555; }
  .search-row input::placeholder { color: var(--muted); }
  .search-row button { background: var(--text); color: var(--bg); border: none; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 0 20px; height: 44px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .search-row button:hover { opacity: 0.85; }
  .search-row button:active { opacity: 0.7; transform: scale(0.98); }
  .suggestions { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; z-index: 100; overflow: hidden; max-height: 240px; overflow-y: auto; }
  .suggestion-item { padding: 10px 14px; font-size: 14px; cursor: pointer; color: var(--text); transition: background 0.1s; display: flex; justify-content: space-between; align-items: center; }
  .suggestion-item:hover { background: var(--border); }
  .suggestion-item .s-year { font-size: 12px; color: var(--muted); }
  .attempts-bar { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
  .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; min-width: 680px; }
  thead th { background: var(--surface); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 10px 8px; text-align: center; border-bottom: 1px solid var(--border); }
  thead th:first-child { text-align: left; padding-left: 14px; min-width: 160px; }
  tbody tr { animation: slideIn 0.3s ease; border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  tbody td { padding: 8px; text-align: center; vertical-align: middle; }
  tbody td:first-child { text-align: left; padding-left: 14px; font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .chip { display: inline-flex; align-items: center; justify-content: center; gap: 3px; padding: 5px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; min-width: 60px; line-height: 1; white-space: nowrap; }
  .chip.correct { background: var(--green-bg); color: var(--green); }
  .chip.close { background: var(--orange-bg); color: var(--orange); }
  .chip.wrong { background: var(--surface2); color: var(--muted); }
  .arrow-up { color: var(--green); font-size: 10px; }
  .arrow-down { color: var(--red); font-size: 10px; }
  .banner { border-radius: 10px; padding: 1.25rem 1.5rem; margin-top: 1.5rem; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.03em; }
  .banner.win { background: var(--green-bg); color: var(--green); border: 1px solid #16a34a; }
  .banner .sub { display: block; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 400; color: inherit; opacity: 0.75; margin-top: 6px; }
  .new-game-btn { margin-top: 12px; display: inline-block; background: var(--text); color: var(--bg); border: none; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; }
  .new-game-btn:hover { opacity: 0.85; }
  .db-info { font-size: 12px; color: var(--muted); margin-bottom: 1rem; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

  <div class="search-area">
    <div class="search-row">

      <button id="guessBtn">Deviner</button>
    </div>
    <div id="suggestions" class="suggestions" style="display:none"></div>
  </div>
  <div class="attempts-bar">

    <span class="db-info" id="dbInfo">Chargement...</span>

    <table>

      <tbody id="guessesBody"></tbody>
    </table>
  </div>
  <div id="banner"></div>
</main>

function isClose(val, tgt, field) {
  if (field === 'annee') return Math.abs(val - tgt) <= 5;
  if (field === 'cv') return tgt > 0 && Math.abs(val - tgt) / tgt <= 0.10;
  if (field === 'cyl') return Math.abs(val - tgt) <= 1;
  if (field === 'prix') return tgt > 0 && Math.abs(val - tgt) / tgt <= 0.10;
  return false;
}

function arrow(val, tgt) {
  if (val < tgt) return '<span class="arrow-up">▲</span>';
  if (val > tgt) return '<span class="arrow-down">▼</span>';
  return '';
}

function chipClass(val, tgt, field) {
  if (typeof val === 'string') return val === tgt ? 'correct' : 'wrong';
  if (val === tgt) return 'correct';
  if (isClose(val, tgt, field)) return 'close';
  return 'wrong';
}

function renderGuess(car) {
  const fields = [
    { val: car.pays, tgt: target.pays, display: car.pays, field: 'pays' },
    { val: car.cat, tgt: target.cat, display: car.cat, field: 'cat' },
    { val: car.annee, tgt: target.annee, display: car.annee + ' ' + arrow(car.annee, target.annee), field: 'annee' },
    { val: car.cv, tgt: target.cv, display: (car.cv === 0 ? 'Élec.' : car.cv + ' ch') + ' ' + arrow(car.cv, target.cv), field: 'cv' },
    { val: car.cyl, tgt: target.cyl, display: car.cyl === 0 ? 'Élec.' : car.cyl + ' ' + arrow(car.cyl, target.cyl), field: 'cyl' },
    { val: car.prix, tgt: target.prix, display: car.prix + 'k€' + ' ' + arrow(car.prix, target.prix), field: 'prix' },
  ];

  const cells = fields.map(f => {
    const cls = chipClass(f.val, f.tgt, f.field);
    return `<td><span class="chip ${cls}">${f.display}</span></td>`;
  });

  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${car.name}</td>${cells.join('')}`;
  guessesBody.prepend(tr);
}

function submitGuess(car) {
  if (gameOver) return;
  if (guesses.find(g => g.name === car.name)) {
    input.value = '';
    suggestionsDiv.style.display = 'none';
    return;
  }
  guesses.push(car);
  tableWrapper.style.display = '';
  const n = guesses.length;
  attemptsText.textContent = n + ' essai' + (n > 1 ? 's' : '');
  renderGuess(car);

  if (car.name === target.name) {
    gameOver = true;
    banner.innerHTML = `<div class="banner win">Bravo ! C'était la ${target.name} (${target.annee})<span class="sub">Trouvée en ${n} essai${n > 1 ? 's' : ''} — ${target.cv} ch · ${target.pays} · ${target.cat}</span><br><button class="new-game-btn" onclick="newGame()">Nouvelle partie</button></div>`;
  }
  input.value = '';
  suggestionsDiv.style.display = 'none';
}

function newGame() {
  guesses = [];
  gameOver = false;
  guessesBody.innerHTML = '';
  tableWrapper.style.display = 'none';
  banner.innerHTML = '';
  attemptsText.textContent = '0 essai';
  const newTarget = CARS[Math.floor(Math.random() * CARS.length)];
  Object.assign(target, newTarget);
}

input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();
  if (!q || q.length < 2) { suggestionsDiv.style.display = 'none'; return; }
  const matches = CARS.filter(c =>
    c.name.toLowerCase().includes(q) && !guesses.find(g => g.name === c.name)
  );
  if (!matches.length) { suggestionsDiv.style.display = 'none'; return; }
  suggestionsDiv.innerHTML = matches.slice(0, 10).map(c =>
    `<div class="suggestion-item" data-name="${c.name}"><span>${c.name}</span><span class="s-year">${c.pays} · ${c.annee}</span></div>`
  ).join('');
  suggestionsDiv.style.display = '';
});

suggestionsDiv.addEventListener('click', e => {
  const item = e.target.closest('.suggestion-item');
  if (!item) return;
  const car = CARS.find(c => c.name === item.dataset.name);
  if (car) submitGuess(car);
});

document.getElementById('guessBtn').addEventListener('click', () => {
  const q = input.value.trim().toLowerCase();
  const matches = CARS.filter(c => c.name.toLowerCase().includes(q) && !guesses.find(g => g.name === c.name));
  if (matches.length === 1) submitGuess(matches[0]);
  else if (matches.length > 1) {
    suggestionsDiv.style.display = '';
  }
});

input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = input.value.trim().toLowerCase();
  const matches = CARS.filter(c => c.name.toLowerCase().includes(q) && !guesses.find(g => g.name === c.name));
  if (matches.length === 1) submitGuess(matches[0]);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-area')) suggestionsDiv.style.display = 'none';
});
</script>
</body>
</html>
