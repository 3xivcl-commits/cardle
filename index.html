<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --text: #f0f0f0; --muted: #888; --green: #22c55e; --green-bg: #052e16;
    --orange: #f59e0b; --orange-bg: #2d1a00; --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  /* ── HEADER ── */
  header {
    width: 100%; max-width: 900px; padding: 1.2rem 1rem 1rem;
    display: flex; flex-direction: column; align-items: center;
    border-bottom: 1px solid var(--border); margin-bottom: 1.5rem;
    position: relative;
  }
  .lang-switcher {
    position: absolute; top: 1.2rem; right: 1rem;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted); font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .lang-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
    padding: 4px 9px; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
  }
  .lang-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .lang-btn:not(.active):hover { border-color: #555; color: var(--text); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; letter-spacing: -1px; color: var(--text); line-height: 1; margin-bottom: 4px; }
  .logo span { color: var(--red); }
  .tagline { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }

  /* ── MAIN ── */
  main { width: 100%; max-width: 900px; padding: 0 1rem 3rem; }

  /* ── LEGEND ── */
  .legend { display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .legend-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

  /* ── SEARCH ── */
  .search-area { position: relative; margin-bottom: 0.75rem; }
  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 16px; padding: 0 14px; height: 48px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
  .search-row input:focus { border-color: #555; }
  .search-row input::placeholder { color: var(--muted); }
  .search-row input:disabled { opacity: 0.35; cursor: not-allowed; }
  .search-row button { background: var(--text); color: var(--bg); border: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 0 18px; height: 48px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .search-row button:active { opacity: 0.7; transform: scale(0.97); }
  .search-row button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── SUGGESTIONS ── */
  .suggestions { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; z-index: 100; overflow: hidden; max-height: 220px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .suggestion-item { padding: 11px 14px; font-size: 14px; cursor: pointer; color: var(--text); transition: background 0.1s; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .suggestion-item:hover, .suggestion-item.selected { background: var(--border); }
  .suggestion-item mark { background: none; color: var(--text); font-weight: 700; }
  .suggestion-item .s-year { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  /* ── ATTEMPTS ── */
  .attempts-bar { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; margin-bottom: 1rem; }

  /* ── TABLE (desktop) ── */
  .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; min-width: 660px; }
  thead th { background: var(--surface); font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 9px 6px; text-align: center; border-bottom: 1px solid var(--border); }
  thead th:first-child { text-align: left; padding-left: 12px; min-width: 150px; }
  tbody tr { animation: slideIn 0.3s ease; border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  tbody td { padding: 7px 6px; text-align: center; vertical-align: middle; }
  tbody td:first-child { text-align: left; padding-left: 12px; font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; }

  /* ── CHIPS ── */
  .chip { display: inline-flex; align-items: center; justify-content: center; gap: 2px; padding: 4px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; min-width: 52px; line-height: 1; white-space: nowrap; }
  .chip.correct { background: var(--green-bg); color: var(--green); }
  .chip.close   { background: var(--orange-bg); color: var(--orange); }
  .chip.wrong   { background: #2a0f0f; color: #a05050; }
  .arrow-up   { color: var(--green); font-size: 9px; }
  .arrow-down { color: var(--red);   font-size: 9px; }

  /* Cards hidden by default (desktop) */
  .cards-list { display: none; }

  .guess-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    animation: slideIn 0.3s ease;
  }
  .guess-card-name {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .guess-card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .guess-card-cell {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .guess-card-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
  }
  .guess-card-cell .chip {
    width: 100%; min-width: unset; font-size: 12px; padding: 7px 6px; justify-content: center;
  }

  /* ── MOBILE (≤ 600px) ── */
  @media (max-width: 600px) {
    header { padding: 1rem 1rem 0.9rem; margin-bottom: 1.25rem; }
    .logo { font-size: 36px; }
    .tagline { font-size: 10px; }
    .lang-switcher { top: 1rem; gap: 4px; }
    .lang-switcher #langLabel { display: none; }
    .lang-btn { font-size: 11px; padding: 3px 7px; }
    main { padding: 0 0.85rem 2.5rem; }
    .legend { gap: 0.85rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
    .legend-item { font-size: 10px; }
    .search-row input { font-size: 16px; height: 50px; }
    .search-row button { height: 50px; font-size: 14px; padding: 0 16px; }
    .attempts-bar { font-size: 11px; margin-bottom: 1rem; }

    /* Hide table, show cards */
    .table-wrapper { display: none !important; }
    .cards-list { display: flex; flex-direction: column; gap: 12px; }
  }

  /* ── BANNER ── */
  .banner { border-radius: 12px; padding: 1.25rem; margin-top: 1.25rem; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.03em; }
  .banner.win { background: var(--green-bg); color: var(--green); border: 1px solid #16a34a; }
  .banner .sub { display: block; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 400; color: inherit; opacity: 0.75; margin-top: 6px; }
  .countdown-block { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(34,197,94,0.2); }
  .countdown-label { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; margin-bottom: 6px; }
  .countdown-time { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 800; letter-spacing: 4px; color: var(--text); }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── STREAK ── */
  .streak-bar {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 1.25rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px 5px 6px;
  }
  .streak-car-wrap {
    width: 44px; height: 20px; position: relative; overflow: hidden; flex-shrink: 0;
  }
  .streak-car-wrap svg {
    position: absolute; top: 0; left: 0;
    animation: drive 0.6s ease-in-out infinite alternate;
  }
  @keyframes drive {
    from { transform: translateX(0px) rotate(-0.5deg); }
    to   { transform: translateX(2px) rotate(0.5deg); }
  }
  .wheel-spin { animation: wspin 0.4s linear infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes wspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .streak-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.03em; white-space: nowrap;
  }
  .streak-text strong { color: var(--text); }
  .streak-tier-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 20px; white-space: nowrap;
  }
  .tier-0 { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }
  .tier-1 { background: #0f1525; color: #5577cc; border: 1px solid #223366; }
  .tier-2 { background: #0f1f0f; color: #44aa44; border: 1px solid #225522; }
  .tier-3 { background: #1f1200; color: #cc8833; border: 1px solid #664400; }
  .tier-4 { background: #1f0000; color: #dd3333; border: 1px solid #660000; }
  .tier-5 { background: #12002a; color: #bb44ff; border: 1px solid #660099; }

  @media (max-width: 600px) {
    .streak-bar { margin-bottom: 1rem; }
    .streak-text { font-size: 12px; }
  }
</style>
</head>

// ── STATE & STORAGE ───────────────────────────────────────────
const TODAY = Math.floor(Date.now() / 86400000);
const STORAGE_KEY = 'cardle_state';

// Seeded pseudo-random based on the day — same result for everyone on the same day,
// but no predictable cycle (mulberry32 hash)
function seededRandom(seed) {
  let t = seed + 0x6D2B79F5;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
const target = CARS[Math.floor(seededRandom(TODAY) * CARS.length)];

let lang = localStorage.getItem('cardle_lang') || 'fr';
let guesses = [];
let gameOver = false;
let countdownInterval = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const state = JSON.parse(raw);
    if (state.day !== TODAY) return;
    guesses = state.guesses || [];
    gameOver = state.gameOver || false;
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ day: TODAY, guesses, gameOver }));
}

// ── STREAK ────────────────────────────────────────────────────
const STREAK_KEY = 'cardle_streak';

function loadStreak() {
  try {
    const raw = localStorage.getItem(STREAK_KEY);
    if (!raw) return { count: 0, lastDay: null };
    return JSON.parse(raw);
  } catch(e) { return { count: 0, lastDay: null }; }
}

function saveStreak(count) {
  localStorage.setItem(STREAK_KEY, JSON.stringify({ count, lastDay: TODAY }));
}

function incrementStreak() {
  const s = loadStreak();
  let newCount;
  if (s.lastDay === TODAY) return s.count; // already counted today
  if (s.lastDay === TODAY - 1) newCount = s.count + 1; // consecutive
  else newCount = 1; // broken streak
  saveStreak(newCount);
  return newCount;
}

function getStreakTier(n) {
  if (n >= 30) return 5;
  if (n >= 14) return 4;
  if (n >= 7)  return 3;
  if (n >= 3)  return 2;
  if (n >= 1)  return 1;
  return 0;
}

function t(key, ...args) {
  const val = T[lang][key];
  return typeof val === 'function' ? val(...args) : val;
}

function dCat(cat)   { return lang === 'en' ? (CAT_EN[cat]  || cat)  : cat;  }
function dPower(cv)  { return cv === 0 ? t('elec') : t('power', cv); }
function dCyl(cyl)   { return cyl === 0 ? t('elec') : String(cyl); }

// ── GAME LOGIC ────────────────────────────────────────────────
function isClose(val, tgt, field) {
  if (field === 'annee') return Math.abs(val - tgt) <= 5;
  if (field === 'cv')    return tgt > 0 && Math.abs(val - tgt) / tgt <= 0.10;
  if (field === 'cyl')   return Math.abs(val - tgt) <= 1;
  if (field === 'prix')  return tgt > 0 && Math.abs(val - tgt) / tgt <= 0.10;
  return false;
}
function arrow(val, tgt) {
  if (val < tgt) return '<span class="arrow-up">▲</span>';
  if (val > tgt) return '<span class="arrow-down">▼</span>';
  return '';
}
function chipClass(val, tgt, field) {
  if (typeof val === 'string') return val === tgt ? 'correct' : 'wrong';
  if (val === tgt) return 'correct';
  return isClose(val, tgt, field) ? 'close' : 'wrong';
}

function getBrand(car) {
  // Extract brand = first word(s) before the model number/name
  // Handle multi-word brands: Aston Martin, Rolls-Royce, etc.
  const multiBrands = ['Aston Martin','Rolls-Royce','Alfa Romeo','Mercedes-AMG'];
  for (const b of multiBrands) {
    if (car.name.startsWith(b)) return b;
  }
  return car.name.split(' ')[0];
}

function buildRow(car) {
  const brand = getBrand(car);
  const fields = [
    { val: brand,     tgt: getBrand(target), display: brand,           field: 'brand' },
    { val: car.pays,  tgt: target.pays,      display: dPays(car.pays), field: 'pays'  },
    { val: car.cat,   tgt: target.cat,       display: dCat(car.cat),   field: 'cat'   },
    { val: car.annee, tgt: target.annee,     display: car.annee + ' ' + arrow(car.annee, target.annee), field: 'annee' },
    { val: car.cv,    tgt: target.cv,        display: dPower(car.cv)  + ' ' + arrow(car.cv, target.cv), field: 'cv'    },
    { val: car.cyl,   tgt: target.cyl,       display: dCyl(car.cyl)   + (car.cyl > 0 ? ' ' + arrow(car.cyl, target.cyl) : ''), field: 'cyl' },
    { val: car.prix,  tgt: target.prix,      display: car.prix + 'k€ ' + arrow(car.prix, target.prix), field: 'prix'  },
  ];
  const cells = fields.map(f => `<td><span class="chip ${chipClass(f.val, f.tgt, f.field)}">${f.display}</span></td>`);
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${car.name}</td>${cells.join('')}`;
  return tr;
}

function buildCard(car) {
  const brand = getBrand(car);
  const fields = [
    { key: 'thBrand',   val: brand,     tgt: getBrand(target), display: brand,           field: 'brand' },
    { key: 'thCountry', val: car.pays,  tgt: target.pays,      display: dPays(car.pays), field: 'pays'  },
    { key: 'thCat',     val: car.cat,   tgt: target.cat,       display: dCat(car.cat),   field: 'cat'   },
    { key: 'thYear',    val: car.annee, tgt: target.annee,     display: car.annee + ' ' + arrow(car.annee, target.annee), field: 'annee' },
    { key: 'thPower',   val: car.cv,    tgt: target.cv,        display: dPower(car.cv)  + ' ' + arrow(car.cv, target.cv), field: 'cv'    },
    { key: 'thCyl',     val: car.cyl,   tgt: target.cyl,       display: dCyl(car.cyl)   + (car.cyl > 0 ? ' ' + arrow(car.cyl, target.cyl) : ''), field: 'cyl' },
    { key: 'thPrice',   val: car.prix,  tgt: target.prix,      display: car.prix + 'k€ ' + arrow(car.prix, target.prix), field: 'prix'  },
  ];
  const card = document.createElement('div');
  card.className = 'guess-card';
  card.innerHTML = `
    <div class="guess-card-name">${car.name}</div>
    <div class="guess-card-grid">
      ${fields.map(f => `
        <div class="guess-card-cell">
          <span class="guess-card-label">${t(f.key)}</span>
          <span class="chip ${chipClass(f.val, f.tgt, f.field)}">${f.display}</span>
        </div>`).join('')}
    </div>`;
  return card;
}

function renderAllGuesses() {
  const tbody = document.getElementById('guessesBody');
  const cardsList = document.getElementById('cardsList');
  const tw = document.getElementById('tableWrapper');
  tbody.innerHTML = '';
  cardsList.innerHTML = '';
  if (guesses.length === 0) { tw.style.display = 'none'; return; }
  tw.style.display = '';
  [...guesses].reverse().forEach(car => {
    tbody.appendChild(buildRow(car));
    cardsList.appendChild(buildCard(car));
  });
}

function renderBanner() {
  const banner = document.getElementById('banner');
  if (!gameOver) { banner.innerHTML = ''; return; }
  const n = guesses.length;
  banner.innerHTML = `<div class="banner win">
    ${t('winTitle', target.name, target.annee)}
    <span class="sub">${t('winSub', n, target.cv, dPays(target.pays), dCat(target.cat))}</span>
    <div class="countdown-block">
      <div class="countdown-label">${t('nextIn')}</div>
      <div class="countdown-time" id="countdown">--:--:--</div>
    </div>
  </div>`;
  startCountdown();
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  function tick() {
    const el = document.getElementById('countdown');
    if (!el) { clearInterval(countdownInterval); return; }
    const now = new Date();
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
    const diff = midnight - now;
    if (diff <= 0) { el.textContent = '00:00:00'; return; }
    const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    el.textContent = `${h}:${m}:${s}`;
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

function disableInput() {
  document.getElementById('carInput').disabled = true;
  document.getElementById('guessBtn').disabled = true;
}

function submitGuess(car) {
  if (gameOver) return;
  if (guesses.find(g => g.name === car.name)) {
    document.getElementById('carInput').value = '';
    document.getElementById('suggestions').style.display = 'none';
    return;
  }
  guesses.push(car);
  saveState();
  document.getElementById('attemptsText').textContent = t('attempts', guesses.length);
  document.getElementById('tableWrapper').style.display = '';
  document.getElementById('guessesBody').prepend(buildRow(car));
  document.getElementById('cardsList').prepend(buildCard(car));

  if (car.name === target.name) {
    gameOver = true;
    saveState();
    incrementStreak();
    disableInput();
    renderBanner();
    renderStreak();
  }
  document.getElementById('carInput').value = '';
  document.getElementById('suggestions').style.display = 'none';
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────
const input = document.getElementById('carInput');
const suggestionsDiv = document.getElementById('suggestions');
let selectedIndex = -1;
let currentMatches = [];

function highlight(text, query) {
  if (!query) return text;
  const idx = normalize(text).indexOf(normalize(query));
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
}

function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function showSuggestions(q) {
  selectedIndex = -1;
  if (!q) { suggestionsDiv.style.display = 'none'; currentMatches = []; return; }
  const nq = normalize(q);
  currentMatches = CARS.filter(c =>
    normalize(c.name).includes(nq) && !guesses.find(g => g.name === c.name)
  );
  if (!currentMatches.length) { suggestionsDiv.style.display = 'none'; return; }
  suggestionsDiv.innerHTML = currentMatches.slice(0, 12).map((c, i) =>
    `<div class="suggestion-item" data-index="${i}" data-name="${c.name}">
      <span>${highlight(c.name, q)}</span>
      <span class="s-year">${dPays(c.pays)} · ${c.annee}</span>
    </div>`
  ).join('');
  suggestionsDiv.style.display = '';
}

function setSelected(i) {
  const items = suggestionsDiv.querySelectorAll('.suggestion-item');
  items.forEach(el => el.classList.remove('selected'));
  if (i >= 0 && i < items.length) {
    selectedIndex = i;
    items[i].classList.add('selected');
    items[i].scrollIntoView({ block: 'nearest' });
    input.value = currentMatches[i].name;
  } else {
    selectedIndex = -1;
  }
}

input.addEventListener('input', () => {
  showSuggestions(input.value.trim());
});

input.addEventListener('keydown', e => {
  const items = suggestionsDiv.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    setSelected(Math.min(selectedIndex + 1, items.length - 1));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    setSelected(Math.max(selectedIndex - 1, 0));
  } else if (e.key === 'Escape') {
    suggestionsDiv.style.display = 'none';
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedIndex >= 0 && currentMatches[selectedIndex]) {
      submitGuess(currentMatches[selectedIndex]);
    } else {
      const q = input.value.trim().toLowerCase();
      const exact = CARS.find(c => normalize(c.name) === normalize(q) && !guesses.find(g => g.name === c.name));
      if (exact) { submitGuess(exact); return; }
      if (currentMatches.length === 1) submitGuess(currentMatches[0]);
      else if (currentMatches.length > 1) showSuggestions(input.value.trim());
    }
  }
});

suggestionsDiv.addEventListener('mousedown', e => {
  // mousedown fires before blur — prevents suggestions closing before click registers
  e.preventDefault();
});

suggestionsDiv.addEventListener('click', e => {
  const item = e.target.closest('.suggestion-item');
  if (!item) return;
  const car = CARS.find(c => c.name === item.dataset.name);
  if (car) submitGuess(car);
});

document.getElementById('guessBtn').addEventListener('click', () => {
  const q = input.value.trim().toLowerCase();
  if (!q) return;
  if (selectedIndex >= 0 && currentMatches[selectedIndex]) {
    submitGuess(currentMatches[selectedIndex]); return;
  }
  const exact = CARS.find(c => normalize(c.name) === normalize(q) && !guesses.find(g => g.name === c.name));
  if (exact) { submitGuess(exact); return; }
  if (currentMatches.length === 1) submitGuess(currentMatches[0]);
  else showSuggestions(input.value.trim());
});

input.addEventListener('blur', () => {
  setTimeout(() => { suggestionsDiv.style.display = 'none'; selectedIndex = -1; }, 150);
});

input.addEventListener('focus', () => {
  if (input.value.trim()) showSuggestions(input.value.trim());
});

// ── INIT ──────────────────────────────────────────────────────
loadState();
setLang(lang);
renderStreak();
if (gameOver) {
  disableInput();
  renderAllGuesses();
  renderBanner();
} else if (guesses.length > 0) {
  renderAllGuesses();
}
</script>
